<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Photo Gallery</title>
<style>
/* Design and Colors from notes.txt */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 15px;
    background: linear-gradient(135deg, #ff0000, #001a66, #0033ff); /* [cite: 2] */
    color: white;
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

/* Grid layout from notes.txt */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); /*  */
    gap: 15px;
    margin-top: 20px;
}

.gallery img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    transition: transform 0.3s; /* [cite: 5] */
    cursor: pointer;
}

.gallery img:hover {
    transform: scale(1.05); /* [cite: 6] */
}

/* Lightbox overlay */
#lightbox {
    display: none;
    position: fixed;
    z-index: 1000;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.9);
    justify-content: center;
    align-items: center;
}

#lightbox img {
    max-width: 90%;
    max-height: 80%;
    border: 3px solid white;
    border-radius: 10px;
}
</style>
</head>
<body>

<h2>SKC NCC MEMORIES</h2>

<div class="gallery">
    <img src="image1.jpg" alt="Image 1" onclick="openLightbox(this.src)">

<script>
/* Simple function to open the clicked image */
function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').style.display = 'flex';
}
